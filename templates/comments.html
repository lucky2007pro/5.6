{% extends 'base.html' %}

{% block title %}My comments{% endblock %}

{% block content %}
<div class="container py-5">
    <h2 class="mb-4">My comments</h2>
    <div class="row">
        <div class="col-12">
            {% for comment in comments %}
                <div class="border rounded p-3 mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <strong>{{ comment.product.title }}</strong>
                        <span>{{ comment.rate }}/5</span>
                    </div>
                    <p class="mb-2">{{ comment.text }}</p>
                    <a href="{% url 'product_detail' id=comment.product.id %}" class="btn btn-sm btn-primary">Mahsulotga o'tish</a>
                </div>
            {% empty %}
                <p>Hozircha comment yozmagansiz.</p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
